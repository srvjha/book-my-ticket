<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Select Seats | Stellar Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        .zinc-border {
            border-color: #27272a;
        }

        .zinc-bg {
            background-color: #18181b;
        }

        .seat {
            transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .seat:not(.booked):hover {
            transform: scale(1.1);
            filter: brightness(1.2);
        }

        .seat.selected {
            background-color: #10b981 !important;
            color: #000 !important;
            filter: drop-shadow(0 0 8px rgba(16, 185, 129, 0.4));
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <!-- Nav -->
    <nav
        class="border-b zinc-border px-6 py-4 flex justify-between items-center bg-zinc-950/50 backdrop-blur-md sticky top-0 z-50">
        <a href="index.html" class="flex items-center gap-2">
            <i data-lucide="clapperboard" class="w-6 h-6 text-emerald-500"></i>
            <span class="text-xl font-bold tracking-tight uppercase">Stellar</span>
        </a>
        <div id="nav-auth" class="flex gap-6 items-center"></div>
    </nav>

    <main class="flex-1 max-w-6xl mx-auto w-full px-6 py-12 grid grid-cols-1 lg:grid-cols-3 gap-12">
        <!-- Sidebar Info -->
        <div class="space-y-8 animate-fade-in">
            <div
                class="relative rounded-2xl overflow-hidden border zinc-border shadow-xl aspect-[2/3] max-w-[200px] mx-auto lg:mx-0">
                <img src="https://assets-in.bmscdn.com/iedb/movies/images/mobile/thumbnail/xlarge/dhurandhar-the-revenge-et00478890-1772893614.jpg"
                    class="w-full h-full object-cover" alt="Poster">
            </div>
            <div class="space-y-4">
                <h2 class="text-2xl font-black tracking-tight">Dhurandhar: The Revenge</h2>
                <div class="flex flex-wrap gap-2 text-xs font-bold uppercase tracking-wider text-zinc-500">
                    <span class="px-2 py-1 bg-zinc-900 border zinc-border rounded">A1</span>
                    <span class="px-2 py-1 bg-zinc-900 border zinc-border rounded">IMAX</span>
                    <span class="px-2 py-1 bg-zinc-900 border zinc-border rounded">2D</span>
                </div>
            </div>

            <div class="pt-8 border-t zinc-border space-y-6">
                <div class="flex justify-between items-center text-sm">
                    <span class="text-zinc-500 font-medium">Selected Seats</span>
                    <span id="selected-seats-display" class="font-bold text-emerald-500">None</span>
                </div>
                <div class="flex justify-between items-center text-sm">
                    <span class="text-zinc-500 font-medium">Total Price</span>
                    <span id="total-price" class="text-xl font-black">$0</span>
                </div>
                <button id="book-button"
                    class="w-full bg-emerald-500 text-black font-black py-4 rounded-xl shadow-lg shadow-emerald-500/20 hover:bg-emerald-400 transition-all active:scale-[0.98]">
                    Checkout Now
                </button>
            </div>
        </div>

        <!-- Theater Map -->
        <div class="lg:col-span-2 bg-zinc-900/30 rounded-3xl border zinc-border p-8 md:p-12 relative overflow-hidden">
            <!-- Screen Arc -->
            <div class="max-w-[400px] mx-auto mb-16 relative">
                <div class="w-full h-1 bg-emerald-500 rounded-full shadow-[0_4px_24px_rgba(16,185,129,0.5)]"></div>
                <div class="text-center text-[10px] uppercase tracking-[0.4em] font-black text-zinc-600 mt-4">Cinema
                    Screen</div>
            </div>

            <!-- Grid -->
            <div class="overflow-x-auto pb-4">
                <div id="seat-grid" class="grid grid-cols-8 gap-3 min-w-[320px] max-w-fit mx-auto">
                    <!-- Seats injected -->
                </div>
            </div>

            <!-- Legend -->
            <div class="flex justify-center gap-8 mt-12 text-[10px] uppercase font-bold tracking-widest text-zinc-500">
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-zinc-800 rounded-sm"></div> Available
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-zinc-950 border border-zinc-800 text-zinc-700 rounded-sm"></div> Booked
                </div>
                <div class="flex items-center gap-2">
                    <div class="w-3 h-3 bg-emerald-500 rounded-sm shadow-sm shadow-emerald-500/50"></div> Selected
                </div>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        let selectedSeats = [];
        let allSeats = [];
        let currentUser = null;

        async function init() {
            lucide.createIcons();
            currentUser = await checkAuth();
            updateNav();
            await loadSeats();

            document.getElementById("book-button").addEventListener("click", confirmBooking);
        }

        function updateNav() {
            const navAuth = document.getElementById("nav-auth");
            if (currentUser) {
                console.log(currentUser)
                navAuth.innerHTML = `
                    <span class="text-sm font-medium text-zinc-500">Hi, ${currentUser.firstName}</span>
                    <button onclick="logout()" class="text-xs font-bold text-zinc-600 hover:text-white transition-colors">Sign Out</button>
                `;
            } else {
                navAuth.innerHTML = `
                    <a href="signin.html?redirect=booking.html" class="text-sm font-bold hover:text-emerald-500 transition-colors">Sign In</a>
                    <a href="signup.html" class="px-5 py-2 bg-zinc-100 text-black text-sm font-bold rounded-full hover:bg-white transition-all">Join</a>
                `;
            }
        }

        async function loadSeats() {
            try {
                const res = await apiFetch("/seats");
                const result = await res.json();
                allSeats = result.data.sort((a, b) => a.id - b.id);
                renderSeats();
            } catch (err) {
                console.error("Failed to load seats", err);
            }
        }

        function renderSeats() {
            const grid = document.getElementById("seat-grid");
            grid.innerHTML = "";

            allSeats.forEach((seat) => {
                const isBooked = seat.is_booked || seat.isbooked;
                const isSelected = selectedSeats.includes(seat.id);

                const seatEl = document.createElement("button");
                seatEl.className = `seat w-full aspect-square rounded-lg text-xs font-bold flex items-center justify-center transition-all 
                    ${isBooked ? 'bg-zinc-950 border border-zinc-800 text-zinc-800 cursor-not-allowed booked' :
                        isSelected ? 'selected' : 'bg-zinc-800 text-zinc-500 hover:zinc-700 hover:text-zinc-300'}`;

                seatEl.innerText = seat.id;

                if (!isBooked) {
                    seatEl.addEventListener("click", () => handleSeatSelection(seat.id));
                }

                grid.appendChild(seatEl);
            });
        }

        function handleSeatSelection(id) {
            if (!currentUser) {
                const confirmLogin = confirm("You need to be signed in to book seats. Sign in now?");
                if (confirmLogin) {
                    window.location.href = `signin.html?redirect=booking.html`;
                }
                return;
            }

            if (selectedSeats.includes(id)) {
                selectedSeats = selectedSeats.filter(s => s !== id);
            } else {
                selectedSeats.push(id);
            }
            updateSummary();
            renderSeats();
        }

        function updateSummary() {
            const display = document.getElementById("selected-seats-display");
            const price = document.getElementById("total-price");

            if (selectedSeats.length === 0) {
                display.innerText = "None";
                price.innerText = "$0";
            } else {
                display.innerText = selectedSeats.join(", ");
                price.innerText = `$${selectedSeats.length * 150}`; // Assuming fixed price
            }
        }

        async function confirmBooking() {
            if (!currentUser) {
                window.location.href = `signin.html?redirect=booking.html`;
                return;
            }

            if (selectedSeats.length === 0) {
                alert("Please select at least one seat.");
                return;
            }

            const name = currentUser.username;
            const button = document.getElementById("book-button");
            button.disabled = true;
            button.innerText = "Processing...";

            let successCount = 0;
            for (const id of selectedSeats) {
                try {
                    const res = await apiFetch(`/${id}/${name}`, { method: "PUT" });
                    const data = await res.json();
                    if (data.success) successCount++;
                } catch (err) {
                    console.error("Booking error", err);
                }
            }

            if (successCount > 0) {
                alert(`Successfully booked ${successCount} seats!`);
            } else {
                alert("Booking failed. Seats might have been taken.");
            }

            selectedSeats = [];
            button.disabled = false;
            button.innerText = "Checkout Now";
            updateSummary();
            await loadSeats();
        }

        init();
    </script>
</body>

</html>
