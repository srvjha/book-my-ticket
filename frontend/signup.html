<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | Stellar Cinema</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            background-color: #09090b;
            color: #fafafa;
        }

        .zinc-border {
            border-color: #27272a;
        }
    </style>
</head>

<body class="min-h-screen flex flex-col">
    <nav class="p-6">
        <a href="index.html" class="flex items-center gap-2 text-zinc-400 hover:text-white transition-colors">
            <i data-lucide="arrow-left" class="w-4 h-4"></i> Back to Home
        </a>
    </nav>

    <main class="flex-1 flex items-center justify-center p-6">
        <div class="max-w-md w-full space-y-8 bg-zinc-900/50 p-10 rounded-3xl border zinc-border backdrop-blur-sm">
            <div class="text-center">
                <h2 class="text-3xl font-black tracking-tight">Join Stellar</h2>
                <p class="text-zinc-500 mt-2">Start your premium booking experience</p>
            </div>

            <form onsubmit="handleSignUp(event)" class="space-y-4">
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Username</label>
                    <input type="text" id="username" required placeholder="johndoe"
                        class="w-full bg-zinc-950 border zinc-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-700">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">First Name</label>
                    <input type="text" id="firstName" required placeholder="John"
                        class="w-full bg-zinc-950 border zinc-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-700">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Last Name</label>
                    <input type="text" id="lastName" required placeholder="Doe"
                        class="w-full bg-zinc-950 border zinc-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-700">
                </div>

                <div class="space-y-1">
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Email Address</label>
                    <input type="email" id="email" required placeholder="john@example.com"
                        class="w-full bg-zinc-950 border zinc-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-700">
                </div>
                <div class="space-y-1">
                    <label class="text-xs font-semibold text-zinc-400 uppercase tracking-wider">Password</label>
                    <input type="password" id="password" required placeholder="••••••••"
                        class="w-full bg-zinc-950 border zinc-border rounded-xl px-4 py-3 focus:outline-none focus:ring-2 focus:ring-emerald-500/50 transition-all placeholder:text-zinc-700">
                </div>

                <button type="submit"
                    class="w-full bg-white text-zinc-950 font-bold py-4 rounded-xl hover:bg-zinc-100 transition-all active:scale-[0.98] mt-4">
                    Create Account
                </button>
            </form>

            <div class="text-center text-sm">
                <span class="text-zinc-500">Already have an account?</span>
                <a href="signin.html" class="text-emerald-500 font-bold ml-1 hover:underline">Sign in</a>
            </div>
        </div>
    </main>

    <script src="js/api.js"></script>
    <script>
        lucide.createIcons();
        async function handleSignUp(e) {
            e.preventDefault();
            const username = document.getElementById("username").value;
            const firstName = document.getElementById("firstName").value;
            const lastName = document.getElementById("lastName").value;
            const email = document.getElementById("email").value;
            const password = document.getElementById("password").value;
            try {
                const res = await apiFetch("/api/v1/auth/signup", {
                    method: 'POST',
                    body: JSON.stringify({ username, firstName, lastName, email, password })
                });
                const data = await res.json();
                if (data.success) {
                    alert("Account created successfully!");
                    window.location.href = "signin.html";
                } else {
                    alert(data.message || "Registration failed");
                }
            } catch (err) {
                alert("Sign up failed. Please try again.");
            }
        }
    </script>
</body>

</html>
